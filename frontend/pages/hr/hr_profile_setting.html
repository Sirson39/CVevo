<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile Settings • CVevo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <div class="dash-head" style="margin-bottom: 2rem;">
          <div>
            <h1 class="dash-welcome">Profile Settings</h1>
            <p class="dash-sub">Manage your recruitment account and company details.</p>
          </div>
        </div>

        <div class="grid grid-2" style="grid-template-columns: 1.25fr 0.75fr; gap: 2.5rem;">
          <section class="stack">
            <article class="card pad-lg">
              <h3 style="margin: 0 0 1.5rem 0; font-size: 1.1rem;">Personal & Company Info</h3>
              <form id="hrProfileForm" class="stack" style="gap: 1.5rem;">
                <div class="grid grid-2" style="gap: 1.5rem;">
                  <div class="field">
                    <label class="label">Your Full Name</label>
                    <input type="text" name="full_name" id="fullName" class="input" placeholder="e.g. John Doe" required>
                  </div>
                  <div class="field">
                    <label class="label">Email Address</label>
                    <input type="email" id="email" class="input" readonly style="background: #f8fafc;">
                  </div>
                </div>

                <div class="grid grid-2" style="gap: 1.5rem;">
                  <div class="field">
                    <label class="label">Company Name</label>
                    <input type="text" name="company" id="company" class="input" placeholder="e.g. Acme Corp" required>
                  </div>
                  <div class="field">
                    <label class="label">Your Role</label>
                    <input type="text" name="role" id="role" class="input" placeholder="e.g. Talent Acquisition Manager" required>
                  </div>
                </div>

                <div style="margin-top: 1rem; display: flex; align-items: center; gap: 1.25rem;">
                  <button type="submit" id="saveBtn" class="btn btn-primary" style="background: #10b981; border: none; padding: 10px 28px;">Save Changes</button>
                  <span id="saveMsg" style="font-size: 0.85rem; font-weight: 600;"></span>
                </div>
              </form>
            </article>
          </section>

          <aside class="stack">
            <div class="card pad-lg" style="background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 20px;">
              <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 1rem;">
                <div style="width: 40px; height: 40px; border-radius: 12px; background: #ecfdf5; color: #10b981; display: grid; place-items: center;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h4 style="margin: 0;">Verified Account</h4>
              </div>
              <p class="muted" style="font-size: 0.85rem; line-height: 1.6;">Your recruiter profile is verified. All job postings under this account will carry the verified badge to increase candidate trust.</p>
            </div>
          </aside>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script>
    initAppLayout({
      pageKey: "hr_profile_settings",
      title: "Profile Settings",
      subtitle: "Manage recruiter account"
    });

    async function loadHrProfile() {
      try {
        const res = await fetch("/api/hr-profiles/me/", {
          credentials: "include"
        });
        const data = await res.json();

        document.getElementById("fullName").value = data.full_name || "";
        document.getElementById("email").value = data.user?.email || "";
        document.getElementById("company").value = data.company || "";
        document.getElementById("role").value = data.role || "";
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById("hrProfileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("saveBtn");
      const msg = document.getElementById("saveMsg");
      
      btn.disabled = true;
      btn.textContent = "Updating...";
      msg.textContent = "";

      const payload = {
        full_name: document.getElementById("fullName").value,
        company: document.getElementById("company").value,
        role: document.getElementById("role").value
      };

      try {
        const res = await fetch("/api/hr-profiles/me/", {
          method: "PATCH",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          msg.textContent = "Profile updated successfully! ✅";
          msg.style.color = "#059669";
          // Update localStorage
          const userStr = localStorage.getItem("currentUser");
          if (userStr) {
            const user = JSON.parse(userStr);
            user.full_name = payload.full_name;
            localStorage.setItem("currentUser", JSON.stringify(user));
            if (window.setUserUI) window.setUserUI();
          }
        } else {
          msg.textContent = "Failed to update profile. ❌";
          msg.style.color = "#dc2626";
        }
      } catch (err) {
        msg.textContent = "A connection error occurred. ❌";
        msg.style.color = "#dc2626";
      } finally {
        btn.disabled = false;
        btn.textContent = "Save Changes";
      }
    });

    loadHrProfile();
  </script>
</body>
</html>
