<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Jobs • CVevo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">

  <style>
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-open { background: #f0fdf4; color: #166534; }
    .status-closed { background: #f1f5f9; color: #475569; }
    .dash-head {
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .table-container { margin-top: 1rem; }
    .job-row:hover { background: #f8fafc; }
  </style>
</head>

<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <div class="dash-head">
          <div>
            <h1 class="dash-welcome">Manage Job Listings</h1>
            <p class="dash-sub">View, edit, or remove your current job openings.</p>
          </div>
          <div class="dash-actions">
            <a href="hr_create_job.html" class="btn btn-primary" style="background: #10b981; border: none;">
              Post New Job
            </a>
          </div>
        </div>

        <div class="table-container card">
          <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
              <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                <th style="padding: 1.25rem; font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700;">Job Information</th>
                <th style="padding: 1.25rem; font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700;">Status</th>
                <th style="padding: 1.25rem; font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700;">Applications</th>
                <th style="padding: 1.25rem; font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700;">Best Score</th>
                <th style="padding: 1.25rem; font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700; text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="jobsManageBody"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script>
    initAppLayout({
      pageKey: "hr_manage_jobs",
      title: "Manage Job Listings",
      subtitle: "View, edit, or remove your current job openings."
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function deleteJob(id) {
      appConfirm(
        "Delete Job Posting?",
        "Are you sure you want to delete this job post? All associated candidate analysis and data will be removed. This action cannot be undone.",
        async function(confirmed) {
          if (!confirmed) return;
          try {
            const res = await fetch(`http://127.0.0.1:8000/api/hr/jobs/${id}/`, {
              method: "DELETE",
              credentials: "include"
            });
            if (res.ok) loadManageJobs();
          } catch (err) {
            console.error(err);
          }
        }
      );
    }

    async function loadManageJobs() {
      try {
        const res = await fetch("http://127.0.0.1:8000/api/hr/manage-jobs/", {
          credentials: "include"
        });
        const data = await res.json();

        const jobs = data.jobs || [];
        const tbody = document.getElementById("jobsManageBody");

        if (!jobs.length) {
          tbody.innerHTML = `
            <tr>
              <td colspan="5" style="padding: 4rem; text-align: center;">
                <div style="margin-bottom: 1.5rem; display: flex; justify-content: center;">
                  <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#e2e8f0" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                </div>
                <h3 style="margin: 0; color: #1e293b;">No jobs posted yet</h3>
                <p class="muted" style="margin: 0.5rem 0 1.5rem 0;">Get started by creating your first job listing.</p>
                <a href="hr_create_job.html" class="btn btn-primary" style="background: #10b981; border: none;">Post a Job</a>
              </td>
            </tr>
          `;
          return;
        }

        tbody.innerHTML = jobs.map(job => `
          <tr class="job-row" style="border-bottom: 1px solid #f1f5f9; transition: background 0.2s;">
            <td style="padding: 1.25rem;">
              <div style="font-weight: 700; font-size: 1rem; color: #1e293b;">${escapeHtml(job.title)}</div>
              <div style="font-size: 0.8rem; color: #64748b; margin-top: 0.25rem;">Created: ${escapeHtml(job.created_at)}</div>
              ${job.deadline ? `
                <div style="font-size: 0.75rem; ${job.is_expired ? "color: #ef4444; font-weight: 600;" : "color: #64748b;"} margin-top: 4px; display: flex; align-items: center; gap: 4px;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                  Deadline: ${escapeHtml(job.deadline)}
                </div>
              ` : ""}
            </td>
            <td style="padding: 1.25rem;">
              <span class="status-badge ${job.status === "Open" ? "status-open" : "status-closed"}">${escapeHtml(job.status)}</span>
            </td>
            <td style="padding: 1.25rem;">
              <div style="display: flex; align-items: center; gap: 0.5rem;">
                <span style="font-weight: 600;">${job.candidate_count || 0}</span>
                <span class="muted" style="font-size: 0.8rem;">candidates</span>
              </div>
            </td>
            <td style="padding: 1.25rem;">
              <div style="font-weight: 800; color: #10b981; font-size: 1.1rem;">
                ${Math.round(job.top_score || 0)}%
              </div>
            </td>
            <td style="padding: 1.25rem; text-align: right;">
              <div style="display: flex; justify-content: flex-end; gap: 0.75rem;">
                <a href="hr_candidate_ranking.html?job_id=${job.id}" class="btn btn-ghost" style="padding: 6px 12px; font-size: 0.8rem;">
                  View Ranked List
                </a>
                <button type="button" onclick="deleteJob(${job.id})" class="btn" style="padding: 6px 12px; font-size: 0.8rem; background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; font-weight: 600;">
                  Delete
                </button>
              </div>
            </td>
          </tr>
        `).join("");
      } catch (err) {
        console.error(err);
      }
    }

    window.deleteJob = deleteJob;
    loadManageJobs();
  </script>
</body>
</html>
