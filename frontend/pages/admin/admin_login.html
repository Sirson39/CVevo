<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Security Portal • CVevo</title>

  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../assets/css/auth.css" />

  <style>
    .auth-shell {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .admin-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .admin-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .admin-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .admin-h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
    }

    .admin-p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .field span {
      color: #cbd5e1;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .field input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
    }

    .field input:focus {
      border-color: #6366f1;
      outline: none;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .btn.primary {
      background: #6366f1;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
                  0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .btn.primary:hover {
      background: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
                  0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    .w100 {
      width: 100%;
    }

    .messages {
      list-style: none;
      padding: 0;
      margin-bottom: 24px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .alert.success {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 48px;
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      background: #6366f1;
      border-radius: 50%;
    }

    .brand-name {
      color: white;
      font-weight: 800;
      letter-spacing: -0.025em;
      font-size: 1.25rem;
    }

    .row.between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .auth-check {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    .auth-check input {
      width: 16px;
      height: 16px;
    }

    .footer-note {
      text-align: center;
      margin-top: 32px;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <div class="admin-card">
      <div class="brand-row">
        <div class="brand-dot"></div>
        <div class="brand-name">CVevo Admin</div>
      </div>

      <div class="admin-header">
        <div class="admin-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1 class="admin-h1">Command Center</h1>
        <p class="admin-p">Authorized access only. All actions are logged.</p>
      </div>

      <div id="errorBox" class="alert error"></div>
      <div id="successBox" class="alert success"></div>

      <form id="adminLoginForm" autocomplete="off">
        <div class="field">
          <span>Administrator Email</span>
          <input type="email" id="email" name="email" placeholder="admin@cvevo.com" required>
        </div>

        <div class="field" style="margin-bottom: 30px;">
          <span>Security Token (Password)</span>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="row between">
          <label class="auth-check">
            <input type="checkbox" id="remember" name="remember">
            Stay authenticated for this session
          </label>
        </div>

        <button class="btn primary w100" type="submit" id="loginBtn">
          Access Command Center →
        </button>
      </form>

      <p class="footer-note">
        © 2026 CVevo Technologies. Confidential.
      </p>
    </div>
  </main>

  <script>
    const form = document.getElementById("adminLoginForm");
    const loginBtn = document.getElementById("loginBtn");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
      successBox.style.display = "none";
    }

    function showSuccess(message) {
      successBox.textContent = message;
      successBox.style.display = "block";
      errorBox.style.display = "none";
    }

    function clearMessages() {
      errorBox.style.display = "none";
      successBox.style.display = "none";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      clearMessages();

      const payload = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        remember: document.getElementById("remember").checked
      };

      const originalText = loginBtn.innerHTML;
      loginBtn.disabled = true;
      loginBtn.innerHTML = "Checking access...";

      try {
        const res = await fetch("http://127.0.0.1:8000/api/admin/login/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.message || "Invalid admin credentials.");
          loginBtn.disabled = false;
          loginBtn.innerHTML = originalText;
          return;
        }

        showSuccess("Access granted. Redirecting...");
        localStorage.setItem("currentUser", JSON.stringify(data.user || {}));

        setTimeout(() => {
          window.location.href = "./super_admin_dashboard.html";
        }, 700);

      } catch (err) {
        console.error(err);
        showError("Something went wrong while trying to sign in.");
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
