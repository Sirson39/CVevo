<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Management | CVevo Admin</title>

  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />

  <style>
    .admin-dashboard-container { padding: 40px; }
    .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
    .analytics-row { display:grid; grid-template-columns:2fr 1fr; gap:24px; }
    .grid-card { background:#fff; padding:24px; border-radius:20px; border:1px solid #e2e8f0; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05); }
    .main-chart { height:400px; }
    .chart-container { height:320px; margin-top:20px; }
    .stats-sidebar { display:flex; flex-direction:column; gap:15px; }
    .mini-stat-card { background:#fff; padding:20px; border-radius:16px; border:1px solid #e2e8f0; }
    .mini-stat-card span { display:block; font-size:0.8rem; font-weight:700; color:#64748b; text-transform:uppercase; }
    .mini-stat-card strong { font-size:1.6rem; font-weight:800; color:#1e293b; display:block; margin-top:5px; }
    .table-responsive { overflow-x:auto; margin-top:15px; }
    .data-table { width:100%; border-collapse:collapse; text-align:left; }
    .data-table th { padding:12px 15px; border-bottom:1px solid #f1f5f9; color:#64748b; font-size:0.8rem; text-transform:uppercase; font-weight:700; }
    .data-table td { padding:16px 15px; border-bottom:1px solid #f8fafc; vertical-align:middle; }
    .status-pill { padding:2px 8px; border-radius:6px; font-size:0.7rem; font-weight:700; text-transform:uppercase; }
    .status-pill.open { background:#dcfce7; color:#15803d; }
    .status-pill.closed { background:#f1f5f9; color:#475569; }
    .status-pill.disabled { background:#fef3c7; color:#92400e; }
    .count-tag { background:#f1f5f9; padding:4px 10px; border-radius:8px; font-size:0.8rem; font-weight:700; }
    .actions { display:flex; gap:8px; }
    .btn-icon { width:32px; height:32px; border-radius:8px; display:grid; place-items:center; border:1px solid #e2e8f0; background:#fff; cursor:pointer; color:#64748b; }
    .btn-icon svg { width:16px; height:16px; }
    .admin-btn { border:1px solid #e2e8f0; padding:10px 18px; border-radius:12px; display:flex; align-items:center; gap:8px; font-weight:700; color:#1e293b; text-decoration:none; font-size:0.9rem; }
  </style>
</head>
<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>
    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <div class="admin-dashboard-container">
          <div class="admin-header">
            <div>
              <h1>Job Post Management</h1>
              <p>Track all current job listings and application volume.</p>
            </div>
            <a href="./super_admin_dashboard.html" class="admin-btn">Dashboard</a>
          </div>

          <div class="analytics-row">
            <div class="grid-card main-chart">
              <h3>Job Listing Status</h3>
              <div class="chart-container">
                <canvas id="statusChart"></canvas>
              </div>
            </div>

            <div id="statsSidebar" class="stats-sidebar"></div>
          </div>

          <div class="grid-card" style="margin-top:30px;">
            <h3>Active Listings</h3>
            <div class="table-responsive">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Job Title</th>
                    <th>Employer</th>
                    <th>Created</th>
                    <th>Apps</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="jobsTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    initAppLayout({
      pageKey: "admin_jobs",
      title: "Job Management",
      subtitle: "Manage all job posts"
    });

    async function deleteJob(id, title) {
      if (typeof appConfirm !== 'function') {
        if (!confirm(`Delete "${title}"?`)) return;
        proceedDelete(id);
        return;
      }
      
      appConfirm("Delete Job Post?", `Are you sure you want to permanently delete "${title}"? All associated data will be removed.`, async (confirmed) => {
        if (confirmed) proceedDelete(id);
      });
    }

    async function proceedDelete(id) {
      try {
        await fetch(`/api/admin/jobs/${id}/`, {
          method: "DELETE",
          credentials: "include"
        });
        loadJobs();
      } catch (err) {
        console.error(err);
      }
    }

    async function loadJobs() {
      try {
        const res = await fetch("/api/admin/jobs/", {
          credentials: "include"
        });
        const data = await res.json();

        document.getElementById("statsSidebar").innerHTML = (data.show_stats || []).map(item => `
          <div class="mini-stat-card">
            <span>${item.label}</span>
            <strong>${item.value}</strong>
          </div>
        `).join("");

        document.getElementById("jobsTableBody").innerHTML = (data.jobs || []).map(job => `
          <tr>
            <td><strong>${job.title || ""}</strong></td>
            <td>${job.company || ""}</td>
            <td>${job.created_at || ""}</td>
            <td><span class="count-tag">${job.num_applicants || 0}</span></td>
            <td><span class="status-pill ${(job.status || "").toLowerCase()}">${job.status || ""}</span></td>
            <td class="actions">
              <a href="./admin_job_edit.html?id=${job.id}" class="btn-icon" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </a>
              <button class="btn-icon" title="Delete" onclick="deleteJob(${job.id}, '${job.title}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>
            </td>
          </tr>
        `).join("");

        new Chart(document.getElementById("statusChart"), {
          type: "bar",
          data: {
            labels: data.status_chart?.labels || [],
            datasets: [{
              label: "Jobs by Status",
              data: data.status_chart?.data || [],
              backgroundColor: ['#2f8f7a', '#64748b', '#f59e0b'],
              borderRadius: 10,
              barThickness: 60
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false
          }
        });
      } catch (err) {
        console.error(err);
      }
    }

    loadJobs();
  </script>
</body>
</html>
