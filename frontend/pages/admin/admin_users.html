<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management | CVevo Admin</title>

  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-soft: #eef2f7;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .admin-dashboard-container { padding: 32px; background: var(--bg); }
    .admin-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 24px; }
    .admin-header h1 { margin: 0; font-size: 2rem; font-weight: 800; color: var(--text); }
    .admin-header p { margin: 8px 0 0; color: var(--muted); font-size: 0.98rem; }
    .header-actions { display: flex; gap: 12px; flex-wrap: wrap; }

    .admin-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .admin-btn.primary { background: var(--primary); color: #fff; }
    .admin-btn.secondary { background: #fff; color: var(--text); border-color: var(--border); }

    .analytics-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: stretch; }
    .grid-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); padding: 22px; }
    .chart-container { height: 220px; margin-top: 8px; }
    .stats-sidebar { display: grid; gap: 16px; }
    .mini-stat-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; box-shadow: var(--shadow); }
    .mini-stat-card span { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; color: var(--muted); }
    .mini-stat-card strong { display: block; margin-top: 4px; font-size: 1.6rem; color: var(--text); font-weight: 800; }

    .table-responsive { overflow-x: auto; margin-top: 12px; }
    .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .data-table thead th { padding: 14px 18px; text-align: left; font-size: 0.78rem; font-weight: 800; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
    .data-table tbody td { padding: 18px; border-bottom: 1px solid var(--border-soft); vertical-align: middle; }
    .data-table tbody tr:hover { background: #f8fafc; }

    .user-cell { display: flex; align-items: center; gap: 14px; }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #dbeafe, #ede9fe); color: #4338ca; display: grid; place-items: center; font-weight: 800; }
    .user-cell strong { display: block; font-size: 1rem; color: var(--text); font-weight: 700; }
    .user-cell p { margin: 0; font-size: 0.92rem; color: var(--muted); }

    .badge { display: inline-flex; padding: 6px 12px; border-radius: 999px; font-size: 0.74rem; font-weight: 800; }
    .role-hr { background: #ffe4e6; color: #e11d48; }
    .role-jobseeker { background: #e0f2fe; color: #0284c7; }
    .role-admin { background: #f3e8ff; color: #7c3aed; }

    .status-text { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; color: var(--text); }
    .dot-status { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot-status.active { background: #22c55e; }
    .dot-status.inactive { background: #94a3b8; }

    .actions { display: flex; gap: 10px; }
    .btn-icon { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; border: 1px solid var(--border); background: #fff; cursor: pointer; color: #64748b; }
    .btn-icon svg { width: 16px; height: 16px; }

    @media (max-width: 1100px) {
      .analytics-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .admin-dashboard-container { padding: 20px; }
      .admin-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <div class="admin-dashboard-container">
          <div class="admin-header">
            <div>
              <h1>User Management</h1>
              <p>Manage user accounts, roles, and platform access in one place.</p>
            </div>

            <div class="header-actions">
              <a href="./super_admin_dashboard.html" class="admin-btn secondary">Dashboard</a>
              <a href="./admin_user_create.html" class="admin-btn primary">Add User</a>
            </div>
          </div>

          <div class="analytics-row">
            <div class="grid-card">
              <h3>Role Distribution</h3>
              <div class="chart-container">
                <canvas id="roleChart"></canvas>
              </div>
            </div>

            <div id="statsSidebar" class="stats-sidebar"></div>
          </div>

          <div class="grid-card" style="margin-top:30px;">
            <h3>Registered Users</h3>
            <div class="table-responsive">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Joined</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    initAppLayout({
      pageKey: "admin_users",
      title: "User Management",
      subtitle: "Manage platform users"
    });

    function confirmDeleteUser(id, email) {
      if (window.appConfirm) {
        window.appConfirm(
          "Delete User Account",
          `Are you sure you want to delete ${email}?`,
          (confirmed) => {
            if (confirmed) deleteUser(id);
          }
        );
      } else {
        if (confirm(`Delete ${email}?`)) deleteUser(id);
      }
    }

    async function deleteUser(id) {
      try {
        await fetch(`http://127.0.0.1:8000/api/admin/users/${id}/`, {
          method: "DELETE",
          credentials: "include"
        });
        loadUsersPage();
      } catch (err) {
        console.error(err);
      }
    }

    async function loadUsersPage() {
      try {
        const res = await fetch("http://127.0.0.1:8000/api/admin/users/", {
          credentials: "include"
        });
        const data = await res.json();

        const statsSidebar = document.getElementById("statsSidebar");
        statsSidebar.innerHTML = (data.show_stats || []).map(item => `
          <div class="mini-stat-card">
            <span>${item.label}</span>
            <strong>${item.value}</strong>
          </div>
        `).join("");

        const tbody = document.getElementById("usersTableBody");
        tbody.innerHTML = (data.users || []).map(u => `
          <tr>
            <td>
              <div class="user-cell">
                <div class="user-avatar">${(u.full_name || u.email || "U").charAt(0).toUpperCase()}</div>
                <div>
                  <strong>${u.full_name || ""}</strong>
                  <p>${u.email || ""}</p>
                </div>
              </div>
            </td>
            <td><span class="badge role-${u.role}">${(u.role || "").toUpperCase()}</span></td>
            <td>${u.date_joined || ""}</td>
            <td>
              <span class="status-text">
                <span class="dot-status ${u.is_verified ? "active" : "inactive"}"></span>
                ${u.is_verified ? "Active" : "Inactive"}
              </span>
            </td>
            <td class="actions">
              <a href="./admin_user_edit.html?id=${u.id}" class="btn-icon" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </a>
              <button class="btn-icon" title="Delete" onclick="confirmDeleteUser(${u.id}, '${u.email}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>
            </td>
          </tr>
        `).join("");

        new Chart(document.getElementById("roleChart"), {
          type: "doughnut",
          data: {
            labels: data.role_chart?.labels || [],
            datasets: [{
              data: data.role_chart?.data || [],
              backgroundColor: ['#4f46e5', '#0ea5e9', '#f43f5e'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '75%'
          }
        });

      } catch (err) {
        console.error("Failed to load users:", err);
      }
    }

    loadUsersPage();
  </script>
</body>
</html>
