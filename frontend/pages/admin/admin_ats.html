<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATS Analytics | CVevo Admin</title>

  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />

  <style>
    .admin-dashboard-container { padding: 40px; }
    .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
    .analytics-row { display:grid; grid-template-columns:2fr 1fr; gap:24px; }
    .grid-card { background:#fff; padding:24px; border-radius:20px; border:1px solid #e2e8f0; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05); }
    .main-chart { height:400px; }
    .chart-container { height:320px; margin-top:20px; }
    .stats-sidebar { display:flex; flex-direction:column; gap:15px; }
    .mini-stat-card { background:#fff; padding:20px; border-radius:16px; border:1px solid #e2e8f0; }
    .mini-stat-card span { display:block; font-size:0.8rem; font-weight:700; color:#64748b; text-transform:uppercase; }
    .mini-stat-card strong { font-size:1.6rem; font-weight:800; color:#1e293b; display:block; margin-top:5px; }
    .table-responsive { overflow-x:auto; margin-top:15px; }
    .data-table { width:100%; border-collapse:collapse; text-align:left; }
    .data-table th { padding:12px 15px; border-bottom:1px solid #f1f5f9; color:#64748b; font-size:0.8rem; text-transform:uppercase; font-weight:700; }
    .data-table td { padding:16px 15px; border-bottom:1px solid #f8fafc; vertical-align:middle; }
    .score-pill-container { display:flex; align-items:center; gap:10px; width:140px; }
    .score-value { font-weight:800; color:#1e293b; font-size:0.9rem; min-width:40px; }
    .score-bar { flex:1; height:6px; background:#f1f5f9; border-radius:10px; overflow:hidden; }
    .score-progress { height:100%; background:linear-gradient(90deg, #6366f1, #2f8f7a); border-radius:10px; }
    .skill-count { background:#f1f5f9; padding:4px 10px; border-radius:8px; font-size:0.75rem; font-weight:700; color:#475569; }
    .admin-btn { border:1px solid #e2e8f0; padding:10px 18px; border-radius:12px; display:flex; align-items:center; gap:8px; font-weight:700; color:#1e293b; text-decoration:none; font-size:0.9rem; }
  </style>
</head>
<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>
    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <div class="admin-dashboard-container">
          <div class="admin-header">
            <div>
              <h1>ATS Intelligence</h1>
              <p>Monitor scoring trends and matching engine performance.</p>
            </div>
            <a href="./super_admin_dashboard.html" class="admin-btn">Dashboard</a>
          </div>

          <div class="analytics-row">
            <div class="grid-card main-chart">
              <h3>Score Distribution</h3>
              <div class="chart-container">
                <canvas id="scoreChart"></canvas>
              </div>
            </div>

            <div id="statsSidebar" class="stats-sidebar"></div>
          </div>

          <div class="grid-card" style="margin-top:30px;">
            <h3>Recent Scan Results</h3>
            <div class="table-responsive">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Jobseeker</th>
                    <th>Target Job</th>
                    <th>Score</th>
                    <th>Skills Found</th>
                    <th>Scanned At</th>
                  </tr>
                </thead>
                <tbody id="atsTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    initAppLayout({
      pageKey: "admin_ats",
      title: "ATS Intelligence",
      subtitle: "ATS engine performance"
    });

    async function loadATSPage() {
      try {
        const res = await fetch("http://127.0.0.1:8000/api/admin/ats/", {
          credentials: "include"
        });
        const data = await res.json();

        document.getElementById("statsSidebar").innerHTML = (data.show_stats || []).map(item => `
          <div class="mini-stat-card">
            <span>${item.label}</span>
            <strong>${item.value}</strong>
          </div>
        `).join("");

        document.getElementById("atsTableBody").innerHTML = (data.ats_results || []).map(result => `
          <tr>
            <td><strong>${result.jobseeker || "Bulk Upload"}</strong></td>
            <td>${result.target_job || ""}</td>
            <td>
              <div class="score-pill-container">
                <span class="score-value">${result.score || 0}%</span>
                <div class="score-bar">
                  <div class="score-progress" style="width:${result.score || 0}%"></div>
                </div>
              </div>
            </td>
            <td><span class="skill-count">${result.skills_found || 0} Skills</span></td>
            <td>${result.scanned_at || ""}</td>
          </tr>
        `).join("");

        new Chart(document.getElementById("scoreChart"), {
          type: "doughnut",
          data: {
            labels: data.score_chart?.labels || [],
            datasets: [{
              data: data.score_chart?.data || [],
              backgroundColor: ['#f43f5e', '#f59e0b', '#10b981'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '70%'
          }
        });
      } catch (err) {
        console.error(err);
      }
    }

    loadATSPage();
  </script>
</body>
</html>
