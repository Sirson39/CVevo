<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add New User | CVevo Admin</title>

  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />

  <style>
    .admin-dashboard-container { padding: 40px; max-width: 900px; margin: 0 auto; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .admin-header h1 { font-size: 1.8rem; font-weight: 800; color: #1e293b; }
    .admin-header p { color: #64748b; margin-top: 5px; }
    .grid-card { background: #fff; padding: 24px; border-radius: 20px; border: 1px solid #e2e8f0; }
    .admin-form { display: flex; flex-direction: column; gap: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.85rem; font-weight: 700; color: #475569; }
    .form-group input, .form-group select {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 0.95rem;
    }
    .form-footer { margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 30px; display: flex; justify-content: flex-end; }
    .admin-btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; text-decoration: none; }
    .admin-btn.primary { background: #1e293b; color: white; }
    .admin-btn.outline { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
    .error-box { display:none; padding:12px 14px; background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; border-radius:12px; }
  </style>
</head>
<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <div class="admin-dashboard-container">
          <div class="admin-header">
            <div>
              <h1>Add New User Account</h1>
              <p>Onboard a new user to the CVevo platform.</p>
            </div>
            <a href="./admin_users.html" class="admin-btn outline">Cancel</a>
          </div>

          <div class="grid-card">
            <div id="errorBox" class="error-box"></div>

            <form id="createUserForm" class="admin-form">
              <div class="form-row">
                <div class="form-group">
                  <label id="fullname-label">Full Name</label>
                  <input type="text" id="full_name" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" id="email" placeholder="john@example.com" required />
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Initial Password</label>
                  <input type="password" id="password" placeholder="Minimum 8 characters" required />
                </div>
                <div class="form-group">
                  <label>Account Role</label>
                  <select id="role">
                    <option value="jobseeker">Jobseeker</option>
                    <option value="hr">HR Recruiter</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
              </div>

              <div class="form-footer">
                <button type="submit" class="admin-btn primary">Create Account</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script>
    initAppLayout({
      pageKey: "admin_create_user",
      title: "Add User",
      subtitle: "Create a new platform user"
    });

    const roleSelect = document.getElementById("role");
    const fullNameLabel = document.getElementById("fullname-label");

    roleSelect.addEventListener("change", function() {
      fullNameLabel.textContent = this.value === "hr" ? "Company Name" : "Full Name";
    });

    document.getElementById("createUserForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const payload = {
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        role: document.getElementById("role").value
      };

      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "none";

      try {
        const res = await fetch("/api/admin/users/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.message || "Failed to create user.";
          errorBox.style.display = "block";
          return;
        }

        window.location.href = "./admin_users.html";
      } catch (err) {
        errorBox.textContent = "Something went wrong.";
        errorBox.style.display = "block";
        console.error(err);
      }
    });
  </script>
</body>
</html>
