<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit User | CVevo Admin</title>

  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />

  <style>
    .admin-dashboard-container { padding: 40px; max-width: 900px; margin: 0 auto; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .grid-card { background: #fff; padding: 24px; border-radius: 20px; border: 1px solid #e2e8f0; }
    .admin-form { display: flex; flex-direction: column; gap: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.85rem; font-weight: 700; color: #475569; }
    .form-group input, .form-group select {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 0.95rem;
    }
    .checkbox-group { flex-direction: row; align-items: center; gap: 12px; margin-top: 25px; }
    .form-footer { margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 30px; display: flex; justify-content: flex-end; }
    .admin-btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; text-decoration: none; }
    .admin-btn.primary { background: #1e293b; color: white; }
    .admin-btn.outline { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
  </style>
</head>
<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <div class="admin-dashboard-container">
          <div class="admin-header">
            <div>
              <h1>Edit User Account</h1>
              <p id="editUserEmail">Loading...</p>
            </div>
            <a href="./admin_users.html" class="admin-btn outline">Cancel</a>
          </div>

          <div class="grid-card">
            <form id="editUserForm" class="admin-form">
              <div class="form-row">
                <div class="form-group">
                  <label id="fullname-label">Full Name</label>
                  <input type="text" id="full_name" required />
                </div>
                <div class="form-group">
                  <label>Email Address</label>
                  <input type="email" id="email" required />
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Account Role</label>
                  <select id="role">
                    <option value="jobseeker">Jobseeker</option>
                    <option value="hr">HR Recruiter</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>

                <div class="form-group checkbox-group">
                  <input type="checkbox" id="is_active" />
                  <label for="is_active">Account Active</label>
                </div>
              </div>

              <div class="form-footer">
                <button type="submit" class="admin-btn primary">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script>
    initAppLayout({
      pageKey: "admin_users",
      title: "Edit User",
      subtitle: "Modify platform user"
    });

    const params = new URLSearchParams(window.location.search);
    const userId = params.get("id");

    function updateLabel(val) {
      document.getElementById("fullname-label").textContent =
        val === "hr" ? "Company Name" : "Full Name";
    }

    document.getElementById("role").addEventListener("change", function() {
      updateLabel(this.value);
    });

    async function loadUser() {
      try {
        const res = await fetch(`/api/admin/users/${userId}/`, {
          credentials: "include"
        });
        const user = await res.json();

        document.getElementById("editUserEmail").textContent = `Modifying details for: ${user.email}`;
        document.getElementById("full_name").value = user.full_name || "";
        document.getElementById("email").value = user.email || "";
        document.getElementById("role").value = user.role || "jobseeker";
        document.getElementById("is_active").checked = !!user.is_active;

        updateLabel(user.role);
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById("editUserForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const payload = {
        full_name: document.getElementById("full_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        role: document.getElementById("role").value,
        is_active: document.getElementById("is_active").checked
      };

      try {
        await fetch(`/api/admin/users/${userId}/`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload)
        });

        window.location.href = "./admin_users.html";
      } catch (err) {
        console.error(err);
      }
    });

    loadUser();
  </script>
</body>
</html>
