<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Search Results • CVevo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <style>
    .dynamic-content { opacity: 0; transition: opacity 0.3s; }
    .dynamic-content.loaded { opacity: 1; }
    .job-card { background: #fff; border-radius: 16px; padding: 1.5rem; border: 1px solid #e2e8f0; border-left: 5px solid #10b981; transition: transform 0.2s, box-shadow 0.2s; }
    .job-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .job-title { font-size: 1.25rem; font-weight: 800; color: #1e293b; margin-bottom: 0.5rem; }
    .job-meta { display: flex; gap: 1rem; color: #64748b; font-size: 0.85rem; margin-bottom: 1rem; }
    .skill-tag { background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
  </style>
</head>
<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content dynamic-content" id="mainContent">
        <header class="ru-head" style="margin-bottom: 2rem;">
          <div>
            <h1 class="ru-title">Search Results</h1>
            <p id="searchMeta" class="ru-sub">Searching for matches...</p>
          </div>
        </header>

        <div id="resultsList" class="grid grid-1" style="gap: 1.5rem;">
          <p class="muted text-center" style="padding: 5rem;">Loading results...</p>
        </div>
      </main>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script>
    initAppLayout({
      pageKey: "search",
      title: "Marketplace Search",
      subtitle: "Find your next career move."
    });

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get('q') || '';
      document.getElementById('searchMeta').innerText = query ? `Found matches for "${query}"` : "Showing all active jobs";

      try {
        const res = await fetch('/api/job-posts/');
        if (res.ok) {
          const data = await res.json();
          // Handle both {"jobs": [...]} and standard [...] array responses
          const allJobs = Array.isArray(data) ? data : (data.jobs || []);
          
          let filtered = allJobs;
          if (query) {
            const q = query.toLowerCase();
            filtered = allJobs.filter(j => 
              (j.title || '').toLowerCase().includes(q) || 
              (j.description || '').toLowerCase().includes(q) ||
              (j.required_skills || '').toLowerCase().includes(q)
            );
          }

          document.getElementById('searchMeta').innerText = query 
            ? `Found ${filtered.length} matches for "${query}"` 
            : `Showing ${filtered.length} active jobs`;
            
          const container = document.getElementById('resultsList');
          
          if (filtered.length === 0) {
            container.innerHTML = `
              <div style="text-align: center; padding: 5rem;">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#cbd5e1" stroke-width="2" style="margin-bottom: 1rem;">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <p class="muted">No jobs found matching "${query}". Try a different keyword.</p>
              </div>`;
          } else {
            container.innerHTML = filtered.map(j => `
              <article class="job-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem;">
                  <div style="flex: 1;">
                    <h2 class="job-title" style="margin:0; font-size: 1.3rem;">${j.title}</h2>
                    <div class="job-meta">
                      <span style="display: flex; align-items: center; gap: 4px;">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${j.company_name || 'Global HQ'}
                      </span>
                      <span style="display: flex; align-items: center; gap: 4px;">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        ${j.job_type || 'Full-time'}
                      </span>
                    </div>
                    <p style="font-size: 0.95rem; color: #475569; margin-bottom: 1.5rem; line-height: 1.6; max-width: 800px;">
                      ${j.description ? (j.description.length > 200 ? j.description.substring(0, 200) + '...' : j.description) : 'Explore this opportunity and apply using our AI-powered resume analyzer.'}
                    </p>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                      ${(j.required_skills || '').split(',').filter(s => s.trim()).map(s => `<span class="skill-tag">${s.trim()}</span>`).join('')}
                    </div>
                  </div>
                  <div style="display: flex; flex-direction: column; justify-content: center;">
                    <a href="../jobseeker/analyze_resume.html?job_id=${j.id}" class="btn btn-primary" style="background: #10b981; border: none; white-space: nowrap; font-weight: 700; padding: 12px 28px; border-radius: 12px; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);">Apply with AI</a>
                  </div>
                </div>
              </article>
            `).join('');
          }
        }
      } catch(e) {
        console.error("Search error:", e);
        document.getElementById('resultsList').innerHTML = '<p class="muted text-center" style="padding: 5rem;">Error connecting to the job marketplace.</p>';
      }

      document.getElementById('mainContent').classList.add('loaded');
    });
  </script>
</body>
</html>
