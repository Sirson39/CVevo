<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Resume Upload • CVevo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content">
        <!-- STEPPER -->
        <div id="jobseekerStepperMount"></div>

        <section class="ru-page">
          <!-- Header -->
          <div class="ru-head" style="margin-bottom: 1.5rem;">
            <div>
              <h1 class="ru-title" style="font-size: 24px;">Resume Upload</h1>
              <p class="ru-sub" style="font-size: 13px; color: #64748b;">Upload and manage your resumes</p>
            </div>
          </div>

          <!-- Upload form -->
          <div class="ru-card">
            <form id="uploadForm">
              <div class="ru-drop" id="dropzone" style="min-height: 180px; border-radius: 12px; gap: 10px;">
                <input class="ru-input" id="resumeFile" name="file" type="file" accept=".pdf,.docx"
                  multiple style="opacity: 0; position: absolute; z-index: -1;" />

                <div class="ru-icon" aria-hidden="true" style="width: 48px; height: 48px; border-radius: 12px;">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 3v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    <path d="M7 8l5-5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                      stroke-linejoin="round" />
                    <path d="M5 14v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5" stroke="currentColor" stroke-width="1.8"
                      stroke-linecap="round" />
                  </svg>
                </div>

                <div class="ru-droptext">
                  <div class="ru-drop-title" style="font-size: 18px; font-weight: 700;">Drop your resumes here</div>
                  <div class="ru-drop-sub" style="font-size: 13px; color: #64748b;">or <span class="ru-linklike" id="browseBtn" style="color: #10b981; font-weight: 600;">click to browse</span> • Multi-select supported</div>
                </div>
              </div>
            </form>

            <div class="ru-meta" style="margin-top: 1rem; gap: 8px;">
              <div class="ru-pill ok" style="padding: 6px 12px; font-size: 12px; border-radius: 999px; display: flex; align-items: center; gap: 6px;">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                <span>PDF files</span>
              </div>
              <div class="ru-pill ok" style="padding: 6px 12px; font-size: 12px; border-radius: 999px; display: flex; align-items: center; gap: 6px;">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                <span>DOCX files</span>
              </div>
              <div class="ru-pill warn" style="padding: 6px 12px; font-size: 12px; border-radius: 999px; display: flex; align-items: center; gap: 6px;">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span>Max 5MB</span>
              </div>
            </div>

            <div id="uploadMsg" style="display:none; margin-top: 1rem;"></div>
          </div>

          <!-- List / History -->
          <div class="ru-card ru-listcard">
            <div class="ru-empty" id="emptyState" style="display:none;">
              <div class="ru-empty-ico" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7 3h7l3 3v15a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z" stroke="currentColor"
                    stroke-width="1.8" />
                  <path d="M14 3v4a2 2 0 0 0 2 2h4" stroke="currentColor" stroke-width="1.8" />
                  <path d="M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </div>

              <h3 class="ru-empty-title">No resumes uploaded yet</h3>
              <p class="ru-empty-sub">Upload your resume to get started with ATS analysis and optimization.</p>
            </div>

            <div class="ru-list" id="resumeList"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- appConfirm and other tools assumed global in app.js or app-layout.js -->
  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
  <script>
    initAppLayout({
      pageKey: "resume_upload",
      stepKey: "resume_upload",
      title: "Resume Upload",
      subtitle: "Upload and manage your resumes"
    });

    const input = document.getElementById('resumeFile');
    const browseBtn = document.getElementById('browseBtn');
    const dropzone = document.getElementById('dropzone');

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    browseBtn?.addEventListener('click', () => input.click());

    ['dragenter', 'dragover'].forEach(ev => {
      dropzone.addEventListener(ev, e => {
        e.preventDefault();
        dropzone.classList.add('is-drag');
      });
    });
    ['dragleave', 'drop'].forEach(ev => {
      dropzone.addEventListener(ev, e => {
        e.preventDefault();
        dropzone.classList.remove('is-drag');
      });
    });

    async function uploadSingleFile(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("filename", file.name);

      // Get CSRF Token from cookie
      const getCookie = (name) => {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
              cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
              break;
            }
          }
        }
        return cookieValue;
      };

      const res = await fetch("/api/resumes/", {
        method: "POST",
        credentials: "include",
        headers: {
          'X-CSRFToken': getCookie('csrftoken')
        },
        body: formData
      });
      return res;
    }

    async function handleUpload(files) {
      const msg = document.getElementById("uploadMsg");
      msg.style.display = "block";
      msg.style.color = "#3b82f6";
      msg.textContent = "Uploading...";

      try {
        for (const file of files) {
          const res = await uploadSingleFile(file);
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.detail || "Upload failed");
          }
        }
        msg.style.color = "#10b981";
        msg.textContent = "All files uploaded successfully.";
        loadResumes();
      } catch (err) {
        msg.style.color = "#ef4444";
        msg.textContent = err.message || "An error occurred during upload.";
      }
    }

    input.addEventListener("change", function() {
      if (this.files && this.files.length) handleUpload(this.files);
    });

    dropzone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      if (files && files.length) handleUpload(files);
    });

    async function deleteResume(id) {
      // Get CSRF Token from cookie
      const getCookie = (name) => {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
              cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
              break;
            }
          }
        }
        return cookieValue;
      };

      try {
        const res = await fetch(`/api/resumes/${id}/`, {
          method: "DELETE",
          credentials: "include",
          headers: {
            'X-CSRFToken': getCookie('csrftoken')
          }
        });
        if (res.ok) {
           loadResumes();
        } else {
           alert("Failed to delete resume. Error: " + res.status);
        }
      } catch (err) {
        console.error(err);
        alert("Server error while deleting.");
      }
    }

    async function loadResumes() {
      const list = document.getElementById("resumeList");
      const empty = document.getElementById("emptyState");

      try {
        const res = await fetch("/api/resumes/", {
          credentials: "include"
        });
        const data = await res.json();
        
        // DRF ViewSet might return direct array or paginated object
        const resumes = Array.isArray(data) ? data : (data.results || []);

        if (!resumes.length) {
          empty.style.display = "block";
          list.innerHTML = "";
          return;
        }

        empty.style.display = "none";
        list.innerHTML = resumes.map(resume => `
          <div class="ru-row" style="padding: 12px 16px; border-radius: 12px; background: #f8fafc; border: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
            <div class="ru-file" style="display: flex; align-items: center; gap: 1rem;">
              <span class="ru-file-ico" style="width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #e2e8f0; color: #64748b;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              </span>
              <div>
                <div class="ru-file-name" style="font-size: 14px; font-weight: 600;">${escapeHtml(resume.filename)}</div>
                <div class="ru-file-sub" style="font-size: 11px; color: #64748b;">Uploaded: ${escapeHtml(resume.uploaded_at)}</div>
              </div>
            </div>

            <div class="ru-actions" style="display: flex; gap: 8px;">
              <a href="${escapeHtml(resume.file)}" class="ru-btn ghost" target="_blank" style="padding: 6px 12px; font-size: 13px; border-radius: 8px; text-decoration: none; color: #64748b; background: #f1f5f9;">View</a>
              <a href="general_analysis.html?resume_id=${resume.id}" class="ru-btn secondary" title="Fast Quality Scan (No JD)" style="padding: 6px 12px; font-size: 13px; border-radius: 8px; background: #f1f5f9; color: #475569; text-decoration: none; border: 1px solid #e2e8f0;">Quality Scan</a>
              <a href="analyze_resume.html?resume_id=${resume.id}" class="ru-btn primary" title="Full ATS Analysis (Select JD)" style="padding: 6px 12px; font-size: 13px; border-radius: 8px; background: #10b981; color: #fff; text-decoration: none;">Analyze</a>
              <button class="ru-btn danger" type="button" 
                onclick="window.appConfirm('Delete Resume?', 'Are you sure you want to delete this resume? This action cannot be undone.', function(c){ if(c) deleteResume(${resume.id}); })" 
                style="padding: 6px 12px; font-size: 13px; border-radius: 8px; background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; font-weight: 700; cursor: pointer;">
                Delete
              </button>
            </div>
          </div>
        `).join("");
      } catch (err) {
        console.error(err);
      }
    }

    loadResumes();
  </script>
</body>
</html>
