<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CVevo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../assets/css/styles.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="app-body">
  <div class="app">
    <div id="sidebarMount"></div>

    <div class="main">
      <div id="topbarMount"></div>

      <main class="content" id="pageContent"></main>
    </div>

    <div id="appConfirmModal">
      <div class="confirm-box">
        <div class="confirm-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h3 class="confirm-h3">Are you sure?</h3>
        <p class="confirm-p">This action cannot be undone. Please confirm to proceed.</p>
        <div class="confirm-btns">
          <button type="button" class="c-btn c-btn-cancel">Cancel</button>
          <button type="button" class="c-btn c-btn-confirm">Yes, Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/app-layout.js"></script>
</body>
</html>
