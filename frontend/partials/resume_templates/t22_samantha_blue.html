<style>
  @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap');
  .t22-wrap { font-family: 'Public Sans', sans-serif; background: #fff; text-align: left; min-height: 850px; }
  .t22-header { background-color: #a8bdca; padding: 2.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; border-bottom: 2px solid #8e9fab; }
  
  .t22-name-box h1 { font-size: 2.5rem; font-weight: 700; color: #1e293b; margin: 0; }
  .t22-role { font-size: 1.1rem; font-weight: 500; color: #475569; margin-top: 0.5rem; }
  .t22-contact { margin-top: 1.5rem; font-size: 0.9rem; color: #334155; }
  .t22-contact-item { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.4rem; }
  
  .t22-summary-box { border-left: 1px solid rgba(0,0,0,0.1); padding-left: 2rem; }
  .t22-summ-title { font-weight: 700; text-transform: uppercase; font-size: 0.9rem; color: #1e293b; margin-bottom: 1rem; border-bottom: 1px solid #1e293b; display: inline-block; }
  .t22-summ-p { font-size: 0.95rem; line-height: 1.5; color: #334155; }
  
  .t22-main { display: grid; grid-template-columns: 33.3% 66.6%; gap: 0; margin-top:0; border-top:none; }
  .t22-left { padding: 2.5rem; border-right: 1px solid #e2e8f0; }
  .t22-right { padding: 2.5rem 3rem; }
  
  .t22-sect-side { margin-bottom: 3rem; }
  .t22-side-title { font-weight: 700; text-transform: uppercase; font-size: 0.9rem; color: #1e293b; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.4rem; letter-spacing: 1px; }
  
  .t22-side-v { margin-bottom: 1.5rem; }
  .t22-side-v strong { display: block; font-size: 0.95rem; color: #0f172a; margin-bottom: 0.2rem; }
  .t22-side-v span { font-size: 0.85rem; color: #64748b; font-style: italic; }
  
  .t22-skill-list { list-style: none; padding: 0; margin: 0; }
  .t22-skill-list li { font-size: 0.9rem; margin-bottom: 0.8rem; color: #334155; }
  
  .t22-main-title { font-weight: 700; text-transform: uppercase; font-size: 1rem; color: #1e293b; margin-bottom: 1.5rem; border-bottom: 2px solid #a8bdca; padding-bottom: 0.4rem; letter-spacing: 1px; }
  
  .t22-item { margin-bottom: 2.5rem; }
  .t22-item-head { font-weight: 700; font-size: 1.05rem; color: #0f172a; margin-bottom: 0.3rem; }
  .t22-item-sub { font-weight: 600; font-size: 0.9rem; font-style: italic; color: #64748b; margin-bottom: 1rem; }
  .t22-desc { font-size: 0.9rem; line-height: 1.6; color: #334155; }
</style>

<div class="t22-wrap">
  <div class="t22-header">
    <div class="t22-name-box">
      <h1 data-field="full_name">YOUR NAME</h1>
      <div class="t22-role" data-field="position">PROFESSIONAL TITLE</div>
      <div class="t22-contact">
        <div class="t22-contact-item">✉ <span data-field="email">email@example.com</span></div>
        <div class="t22-contact-item">📞 <span data-field="phone">+1 234 567 890</span></div>
        <div class="t22-contact-item">📍 <span data-field="location">City, Country</span></div>
      </div>
    </div>
    <div class="t22-summary-box">
      <div class="t22-summ-title">Summary</div>
      <p class="t22-summ-p" data-field="summary">Your summary content...</p>
    </div>
  </div>

  <div class="t22-main">
    <div class="t22-left">
      <div class="t22-sect-side">
        <div class="t22-side-title">Education</div>
        <div data-list="educations">
          <div class="t22-side-v" data-tpl>
            <strong data-field="institution">Institution</strong>
            <span><span data-field="location">Location</span> / <span data-field="date_range">2016-2020</span></span><br>
            <div style="font-size:0.9rem; margin-top:0.3rem;" data-field="degree">Degree Name</div>
          </div>
        </div>
      </div>

      <div class="t22-sect-side">
        <div class="t22-side-title">Skills</div>
        <ul class="t22-skill-list" data-list="skills">
          <li data-tpl data-field="name">Skill Name</li>
        </ul>
      </div>
    </div>

    <div class="t22-right">
      <div class="t22-main-title">Experience</div>
      <div data-list="experiences">
        <div class="t22-item" data-tpl>
          <div class="t22-item-head"><span data-field="position">Role Name</span> — <span data-field="company">Company</span></div>
          <div class="t22-item-sub"><span data-field="location">Location</span> / <span data-field="date_range">Jan 2020 - Current</span></div>
          <div class="t22-desc" data-field="description">Job description...</div>
        </div>
      </div>
    </div>
  </div>
</div>
