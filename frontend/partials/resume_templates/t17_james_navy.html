<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  .t17-wrap { font-family: 'Inter', sans-serif; background: #fff; min-height: 850px; text-align: left; position: relative; }
  .t17-navy-header { background-color: #0f172a; height: 100px; padding: 0 3rem; display: flex; align-items: flex-end; justify-content: flex-end; }
  .t17-name-navy { color: #fff; font-size: 2.2rem; font-weight: 700; margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 2px; }
  
  .t17-main { display: grid; grid-template-columns: 32% 68%; gap: 0; }
  .t17-left { padding: 2.5rem 2rem; background: #fff; border-right: 1px solid #e2e8f0; }
  .t17-right { padding: 3rem 2.5rem; background: #fff; }
  
  .t17-img-container { width: 180px; height: 180px; margin-top: -90px; position: relative; z-index: 10; border: 5px solid #fff; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-weight: 700; color: #cbd5e1; }
  
  .t17-sect-side { margin-top: 2rem; margin-bottom: 2.5rem; }
  .t17-side-title { font-size: 1rem; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid #0f172a; padding-bottom: 0.4rem; margin-bottom: 1.2rem; color: #0f172a; }
  .t17-side-item { font-size: 0.85rem; color: #334155; margin-bottom: 1rem; line-height: 1.5; }
  .t17-side-item strong { display: block; font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin-bottom: 0.2rem; }
  
  .t17-sect-title { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1.5rem; color: #0f172a; }
  .t17-p { font-size: 0.95rem; line-height: 1.6; color: #334155; margin-bottom: 2.5rem; }
  
  .t17-item { margin-bottom: 2rem; }
  .t17-item-title { font-weight: 700; font-size: 1.05rem; color: #0f172a; }
  .t17-item-sub { font-weight: 600; color: #475569; margin-bottom: 0.4rem; font-size: 0.95rem; }
  .t17-item-date { color: #64748b; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.8rem; }
  .t17-desc { font-size: 0.9rem; line-height: 1.6; color: #334155; padding-left: 1.2rem; margin: 0; }
  
  .t17-skill-list { list-style: none; padding: 0; margin: 0; }
  .t17-skill-list li { font-size: 0.9rem; margin-bottom: 0.6rem; color: #334155; display: flex; align-items: center; gap: 0.6rem; }
  .t17-skill-list li::before { content: "•"; color: #0f172a; font-size: 1.2rem; }
</style>

<div class="t17-wrap">
  <div class="t17-navy-header">
    <div class="t17-name-navy" data-field="full_name">YOUR NAME</div>
  </div>

  <div class="t17-main">
    <div class="t17-left">
      <div class="t17-img-container" data-field="full_name">U</div>

      <div class="t17-sect-side">
        <div class="t17-side-title">Details</div>
        <div class="t17-side-item"><strong>Email</strong> <span data-field="email">email@example.com</span></div>
        <div class="t17-side-item"><strong>Phone</strong> <span data-field="phone">+1 234 567 890</span></div>
        <div class="t17-side-item"><strong>Location</strong> <span data-field="location">City, Country</span></div>
      </div>

      <div class="t17-sect-side">
        <div class="t17-side-title">Skills</div>
        <ul class="t17-skill-list" data-list="skills">
          <li data-tpl data-field="name">Skill Name</li>
        </ul>
      </div>
    </div>

    <div class="t17-right">
      <div style="font-weight: 600; color: #64748b; font-size: 1.1rem; margin-bottom: 2rem; margin-top: -1rem; text-transform: uppercase;" data-field="position">
        PROFESSIONAL TITLE
      </div>

      <div class="t17-sect-title">Summary</div>
      <p class="t17-p" data-field="summary">Your summary...</p>

      <div class="t17-sect-title">Experience</div>
      <div data-list="experiences">
        <div class="t17-item" data-tpl>
          <div class="t17-item-title" data-field="position">Role</div>
          <div class="t17-item-sub"><span data-field="company">Company</span>, <span data-field="location">Location</span></div>
          <div class="t17-item-date" data-field="date_range">Jan 2020 — Current</div>
          <ul class="t17-desc">
            <li data-field="description">Description...</li>
          </ul>
        </div>
      </div>

      <div class="t17-sect-title">Education</div>
      <div data-list="educations">
        <div class="t17-item" data-tpl>
          <div class="t17-item-title" data-field="degree">Degree</div>
          <div class="t17-item-sub" data-field="institution">Institution</div>
          <div class="t17-item-date" data-field="date_range">2016 — 2020</div>
        </div>
      </div>
    </div>
  </div>
</div>
