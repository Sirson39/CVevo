<style>
  @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap');
  .t21-wrap { font-family: 'Public Sans', sans-serif; background: #fff; color: #1e293b; padding: 2rem; text-align: left; min-height: 850px; }
  .t21-top-bar { border-top: 3px solid #1e293b; padding-top: 1.5rem; border-bottom: 3px solid #1e293b; padding-bottom: 1.5rem; margin-bottom: 3rem; }
  .t21-name { font-size: 2.22rem; font-weight: 700; text-transform: uppercase; margin: 0; color: #111; letter-spacing: 1px; }
  .t21-role { font-size: 1rem; font-weight: 600; text-transform: uppercase; color: #444; margin-top: 0.5rem; letter-spacing: 1px; }
  
  .t21-main { display: grid; grid-template-columns: 1fr 240px; gap: 3rem; }
  
  .t21-sect-title { font-size: 1rem; font-weight: 700; text-transform: uppercase; color: #111; border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.8rem; }
  
  .t21-p { font-size: 0.95rem; line-height: 1.6; color: #333; margin-bottom: 2.5rem; }
  
  .t21-item { margin-bottom: 2rem; position: relative; padding-left: 2rem; }
  .t21-item::before { content: ""; position: absolute; left: 0; top: 8px; width: 100%; height: 2px; background: transparent; } /* logic spacer */
  
  .t21-dot { position: absolute; left: 0; top: 8px; width: 10px; height: 10px; border: 2px solid #1e293b; border-radius: 50%; background: #fff; z-index: 2; }
  .t21-line-v { position: absolute; left: 4px; top: 18px; width: 2px; height: calc(100% + 1rem); background: #eee; z-index: 1; }
  
  .t21-item-grid { display: grid; grid-template-columns: 140px 1fr; gap: 2rem; }
  .t21-date { font-weight: 700; font-size: 0.85rem; color: #444; text-transform: uppercase; padding-top: 0.2rem; }
  .t21-item-title { font-weight: 700; font-size: 1rem; text-transform: uppercase; color: #111; }
  .t21-item-sub { font-weight: 600; font-size: 0.95rem; color: #444; margin-bottom: 0.5rem; }
  .t21-desc { font-size: 0.9rem; line-height: 1.6; color: #333; padding-left: 1.2rem; margin: 0.5rem 0 0 0; }
  
  .t21-side-sect { margin-bottom: 3rem; }
  .t21-side-item { display: flex; align-items: flex-start; gap: 0.8rem; font-size: 0.85rem; color: #333; margin-bottom: 0.8rem; }
  .t21-side-icon { font-size: 0.9rem; width: 18px; opacity: 0.8; }
  
  .t21-skills-grid { display: grid; grid-template-columns: 1fr; gap: 0.8rem; }
</style>

<div class="t21-wrap">
  <div class="t21-top-bar">
    <h1 class="t21-name" data-field="full_name">YOUR NAME</h1>
    <div class="t21-role" data-field="position">PROFESSIONAL TITLE</div>
  </div>

  <div class="t21-main">
    <div>
      <section>
        <div class="t21-sect-title">Summary</div>
        <p class="t21-p" data-field="summary">Your summary...</p>
      </section>

      <section>
        <div class="t21-sect-title">💼 Experience</div>
        <div data-list="experiences">
          <div class="t21-item" data-tpl>
            <div class="t21-dot"></div>
            <div class="t21-line-v"></div>
            <div class="t21-item-grid">
              <div class="t21-date" data-field="date_range">Jan 2020 - Current</div>
              <div>
                <div class="t21-item-title" data-field="position">Role Name</div>
                <div class="t21-item-sub"><span data-field="company">Company</span>, <span data-field="location">Location</span></div>
                <ul class="t21-desc">
                  <li data-field="description">Description...</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section style="margin-top:2rem;">
        <div class="t21-sect-title">📖 Education</div>
        <div data-list="educations">
          <div class="t21-item" data-tpl>
            <div class="t21-dot"></div>
            <div class="t21-line-v"></div>
            <div class="t21-item-grid">
              <div class="t21-date" data-field="date_range">2016 - 2020</div>
              <div>
                <div class="t21-item-title" data-field="institution">Institution</div>
                <div class="t21-item-sub" data-field="degree">Degree Name</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="t21-sidebar">
      <div class="t21-side-sect">
        <div class="t21-side-item"><span class="t21-side-icon">✉</span> <span data-field="email">email@example.com</span></div>
        <div class="t21-side-item"><span class="t21-side-icon">📞</span> <span data-field="phone">+1 234 567 890</span></div>
        <div class="t21-side-item" style="line-height:1.4;"><span class="t21-side-icon">📍</span> <span data-field="location">City, Country</span></div>
      </div>

      <div class="t21-side-sect">
        <div class="t21-sect-title" style="font-size: 0.9rem;">🏆 Skills</div>
        <div class="t21-skills-grid" data-list="skills">
          <div style="font-size: 0.85rem; color: #333;" data-tpl>• <span data-field="name">Skill</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
