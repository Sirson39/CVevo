<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap');
  .t5-wrap { font-family: 'Lato', sans-serif; background: #fff; padding: 2rem; border: 8px solid #634832; position: relative; min-height: 850px; text-align: left; }
  .t5-header { display: flex; align-items: flex-start; margin-bottom: 2rem; gap: 2rem; }
  .t5-bio { display: flex; flex-direction: column; }
  .t5-initial-wrap { width: 140px; height: 100px; background: #f5f2eb; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
  .t5-name { font-size: 1.8rem; font-weight: 900; margin: 0; color: #1a1a1a; letter-spacing: -0.5px; }
  .t5-role { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #4a4a4a; margin-top: 0.5rem; }
  
  .t5-main { display: grid; grid-template-columns: 1.5fr 1fr; gap: 3rem; }
  .t5-sect-title { font-size: 1.1rem; font-weight: 700; color: #634832; margin-bottom: 1rem; position: relative; }
  .t5-p { font-size: 0.9rem; line-height: 1.6; color: #333; margin-bottom: 2rem; white-space: pre-line; }
  
  .t5-item { margin-bottom: 1.8rem; }
  .t5-item-head { display: flex; flex-direction: column; margin-bottom: 0.4rem; }
  .t5-item-dates { font-weight: 700; font-size: 0.8rem; color: #4a4a4a; margin-bottom: 0.2rem; }
  .t5-item-title { font-weight: 800; font-size: 1rem; color: #1a1a1a; margin-bottom: 0.2rem; }
  .t5-item-sub { font-weight: 700; font-size: 0.9rem; color: #333; margin-bottom: 0.5rem; }
  .t5-item-desc { font-size: 0.9rem; line-height: 1.5; color: #333; margin: 0; padding-left: 1.2rem; }
  
  .t5-details { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; line-height: 1.8; color: #333; }
  .t5-details li { margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .t5-icon { width: 14px; text-align: center; font-size: 0.9rem; }
  
  .t5-skill-tag { display: inline-block; background: #826a56; color: #fff; padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.8rem; font-weight: 700; margin-right: 0.4rem; margin-bottom: 0.5rem; }
</style>

<div class="t5-wrap">
  <div class="t5-header">
    <div class="t5-initial-wrap">
      <h1 class="t5-name" data-field="full_name">UN</h1>
    </div>
    <div class="t5-bio">
      <h1 class="t5-name" style="font-size: 2.22rem; line-height: 1;" data-field="full_name">YOUR NAME</h1>
      <div class="t5-role" data-field="position">PROFESSIONAL TITLE</div>
    </div>
  </div>

  <div class="t5-main">
    <div class="t5-left">
      <section>
        <div class="t5-sect-title">Summary</div>
        <p class="t5-p" data-field="summary">Your summary...</p>
      </section>

      <section>
        <div class="t5-sect-title">Experience</div>
        <div data-list="experiences">
          <div class="t5-item" data-tpl>
            <div class="t5-item-head">
              <span class="t5-item-dates" data-field="date_range">Jan 2020 - Current</span>
              <span class="t5-item-title" data-field="position">Role Name</span>
              <span class="t5-item-sub" data-field="company">Company Name</span>
            </div>
            <ul class="t5-item-desc">
              <li data-field="description">Description...</li>
            </ul>
          </div>
        </div>
      </section>

      <section>
        <div class="t5-sect-title">Education</div>
        <div data-list="educations">
          <div class="t5-item" data-tpl>
            <span class="t5-item-dates" data-field="date_range">2016 - 2020</span>
            <div class="t5-item-title" data-field="degree">Degree Name</div>
            <div class="t5-item-sub" data-field="institution">Institution</div>
          </div>
        </div>
      </section>
    </div>

    <div class="t5-right">
      <div style="border-left: 1px dotted #634832; padding-left: 2rem; height: 100%;">
        <section>
          <div class="t5-sect-title">Details</div>
          <ul class="t5-details">
            <li><span class="t5-icon">✉</span> <span data-field="email">email@example.com</span></li>
            <li><span class="t5-icon">📍</span> <span data-field="location">City, Country</span></li>
            <li><span class="t5-icon">📞</span> <span data-field="phone">+1 234 567 890</span></li>
            <li><span class="t5-icon">🔗</span> <span data-field="linkedin">LinkedIn</span></li>
            <li><span class="t5-icon">🌐</span> <span data-field="portfolio">Portfolio</span></li>
          </ul>
        </section>

        <section style="margin-top: 3rem;">
          <div class="t5-sect-title">Skills</div>
          <div style="display: flex; flex-direction: column;" data-list="skills">
            <div class="t5-skill-tag" data-tpl data-field="name">Skill</div>
          </div>
        </section>
      </div>
    </div>
  </div>
</div>
