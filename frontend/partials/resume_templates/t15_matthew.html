<style>
  @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&swap');
  .t15-wrap { font-family: 'Segoe UI', -apple-system, sans-serif; background: #fff; color: #1a2b3c; padding: 2.5rem; text-align: left; }
  .t15-head { display: flex; gap: 2rem; align-items: center; margin-bottom: 2.5rem; }
  .t15-img { width: 90px; height: 90px; background: #eee; border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: #cbd5e1; }
  .t15-title-wrap h1 { font-size: 2rem; font-weight: 700; margin: 0; color: #0f172a; }
  .t15-role { font-size: 0.95rem; color: #64748b; font-weight: 600; }
  
  .t15-main { display: grid; grid-template-columns: 1fr 220px; gap: 3rem; }
  .t15-sect-title { font-size: 1.1rem; font-weight: 700; color: #0f172a; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.8rem; }
  
  .t15-p { font-size: 0.95rem; line-height: 1.6; color: #334155; margin-bottom: 2rem; }
  
  .t15-item { margin-bottom: 1.8rem; border-left: 2px solid #e2e8f0; padding-left: 1.5rem; position: relative; }
  .t15-item::before { content: ""; position: absolute; left: -7px; top: 0; width: 12px; height: 12px; background: #0f172a; border-radius: 50%; }
  .t15-item-title { font-weight: 700; font-size: 1.05rem; color: #0f172a; }
  .t15-item-date { font-size: 0.85rem; color: #64748b; margin: 0.2rem 0 0.5rem 0; }
  .t15-desc { font-size: 0.9rem; line-height: 1.6; color: #334155; margin: 0; }
  
  .t15-side-sect { margin-bottom: 2.5rem; }
  .t15-side-title { font-size: 1rem; font-weight: 700; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; margin-bottom: 1rem; }
  .t15-side-item { font-size: 0.9rem; margin-bottom: 0.8rem; color: #334155; line-height: 1.5; }
</style>

<div class="t15-wrap">
  <div class="t15-head">
    <div class="t15-img" data-field="full_name">U</div>
    <div class="t15-title-wrap">
        <h1 data-field="full_name">YOUR NAME</h1>
        <div class="t15-role" data-field="position">PROFESSIONAL TITLE</div>
    </div>
  </div>

  <div class="t15-main">
    <div class="t15-content">
      <div class="t15-sect-title">👤 Summary</div>
      <p class="t15-p" data-field="summary">Your summary...</p>

      <div class="t15-sect-title">💼 Experience</div>
      <div data-list="experiences">
        <div class="t15-item" data-tpl>
          <div class="t15-item-title"><span data-field="position">Role</span>, <span data-field="company">Company</span></div>
          <div class="t15-item-date" data-field="date_range">Jan 2020 — Current</div>
          <p class="t15-desc" data-field="description">Description...</p>
        </div>
      </div>

      <div class="t15-sect-title">🎓 Education</div>
      <div data-list="educations">
        <div class="t15-item" data-tpl>
          <div class="t15-item-title"><span data-field="degree">Degree</span>, <span data-field="institution">Institution</span></div>
          <div class="t15-item-date" data-field="date_range">2016 — 2020</div>
        </div>
      </div>
    </div>

    <div class="t15-sidebar">
      <div class="t15-side-sect">
        <div class="t15-side-title">Details</div>
        <div class="t15-side-item" data-field="email">email@example.com</div>
        <div class="t15-side-item" data-field="location">City, Country</div>
        <div class="t15-side-item" data-field="phone">+1 234 567 890</div>
      </div>

      <div class="t15-side-sect">
        <div class="t15-side-title">Skills</div>
        <div data-list="skills">
          <div class="t15-side-item" data-tpl>• <span data-field="name">Skill</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
