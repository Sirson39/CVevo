<style>
  @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap');
  .t16-wrap { font-family: 'Public Sans', sans-serif; display: flex; background: #fff; color: #1e293b; min-height: 850px; text-align: left; }
  .t16-left { width: 35%; background-color: #f1f5f9; padding: 2.5rem 2rem; border-right: 1px solid #e2e8f0; }
  .t16-right { width: 65%; padding: 2.5rem 3rem; }
  
  .t16-img-wrap { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; margin: 0 auto 2.5rem auto; border: 4px solid #fff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); background: #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #fff; font-weight: 700; }
  
  .t16-name { font-size: 2.5rem; font-weight: 700; color: #0f172a; margin: 0 0 0.5rem 0; letter-spacing: -1px; }
  .t16-role-top { font-size: 1.1rem; color: #64748b; font-weight: 600; margin-bottom: 2rem; }
  
  .t16-contact { margin-bottom: 2.5rem; }
  .t16-contact-item { display: flex; align-items: center; gap: 0.8rem; font-size: 0.9rem; color: #334155; margin-bottom: 0.8rem; }
  .t16-icon { font-size: 1rem; width: 20px; text-align: center; }
  
  .t16-sect-side { margin-bottom: 2.5rem; }
  .t16-side-title { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; color: #0f172a; border-bottom: 2px solid #cbd5e1; padding-bottom: 0.5rem; margin-bottom: 1.2rem; letter-spacing: 1px; }
  .t16-side-list { list-style: none; padding: 0; margin: 0; }
  .t16-side-list li { font-size: 0.95rem; margin-bottom: 0.8rem; position: relative; padding-left: 1.2rem; }
  .t16-side-list li::before { content: "•"; position: absolute; left: 0; color: #64748b; font-size: 1.2rem; }
  
  .t16-sect-title { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; color: #0f172a; margin-bottom: 1.2rem; letter-spacing: 1px; }
  .t16-p { font-size: 0.95rem; line-height: 1.6; color: #334155; margin-bottom: 2.5rem; }
  
  .t16-item { margin-bottom: 2rem; }
  .t16-item-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.4rem; }
  .t16-item-title { font-weight: 700; font-size: 1.05rem; color: #0f172a; }
  .t16-item-date { font-weight: 600; font-size: 0.9rem; color: #64748b; }
  .t16-desc { font-size: 0.9rem; line-height: 1.6; color: #334155; padding-left: 1.2rem; margin: 0.5rem 0 0 0; }
</style>

<div class="t16-wrap">
  <div class="t16-left">
    <div class="t16-img-wrap" data-field="full_name">U</div>

    <div class="t16-sect-side">
      <div class="t16-side-title">Skills</div>
      <ul class="t16-side-list" data-list="skills">
        <li data-tpl data-field="name">Skill Item</li>
      </ul>
    </div>
  </div>

  <div class="t16-right">
    <h1 class="t16-name" data-field="full_name">YOUR NAME</h1>
    <div class="t16-role-top" data-field="position">PROFESSIONAL TITLE</div>

    <div class="t16-contact">
      <div class="t16-contact-item"><span class="t16-icon">✉</span> <span data-field="email">email@example.com</span></div>
      <div class="t16-contact-item"><span class="t16-icon">📍</span> <span data-field="location">City, Country</span></div>
      <div class="t16-contact-item"><span class="t16-icon">📞</span> <span data-field="phone">+1 234 567 890</span></div>
    </div>

    <div class="t16-sect-title">Summary</div>
    <p class="t16-p" data-field="summary">Your summary...</p>

    <div class="t16-sect-title">Experience</div>
    <div data-list="experiences">
      <div class="t16-item" data-tpl>
        <div class="t16-item-head">
          <span class="t16-item-title"><span data-field="position">Role</span>, <span data-field="company">Company</span></span>
        </div>
        <div class="t16-item-date" data-field="date_range">Jan 2020 — Current</div>
        <ul class="t16-desc">
          <li data-field="description">Description...</li>
        </ul>
      </div>
    </div>

    <div class="t16-sect-title">Education</div>
    <div data-list="educations">
      <div class="t16-item" data-tpl>
        <div class="t16-item-title"><span data-field="degree">Degree</span>, <span data-field="institution">Institution</span></div>
        <div class="t16-item-date" data-field="date_range">2016 — 2020</div>
      </div>
    </div>
  </div>
</div>
