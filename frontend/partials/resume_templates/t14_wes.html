<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
  .t14-wrap { font-family: 'Montserrat', sans-serif; display: flex; background: #fff; color: #1a1a1b; min-height: 850px; text-align: left; }
  .t14-left { width: 32%; background-color: #f3f4f6; padding: 2rem 1.5rem; }
  .t14-right { width: 68%; padding: 2rem 2.5rem; }
  
  .t14-name-box { border: 2px solid #1a1a1b; padding: 1.5rem 1rem; text-align: center; margin-bottom: 2rem; background: #fff; margin-top: -1rem; margin-right: -4rem; position: relative; z-index: 10; width: 100%; box-sizing: border-box; }
  .t14-name { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0; color: #1a1a1b; letter-spacing: 1px; }
  .t14-role-top { font-size: 0.8rem; font-weight: 700; color: #444; margin-top: 0.5rem; text-transform: uppercase; }
  
  .t14-sect-side { margin-bottom: 2rem; }
  .t14-side-title { font-size: 0.9rem; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #1a1a1b; padding-bottom: 0.3rem; margin-bottom: 1rem; letter-spacing: 1px; }
  .t14-side-v { font-size: 0.85rem; margin-bottom: 0.8rem; line-height: 1.4; color: #333; }
  .t14-side-v strong { display: block; font-size: 0.75rem; text-transform: uppercase; color: #666; }
  
  .t14-sect-title { font-size: 1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 1rem; border-bottom: 2px solid #1a1a1b; display: inline-block; padding-bottom: 0.2rem; letter-spacing: 1px; }
  .t14-p { font-size: 0.9rem; line-height: 1.6; color: #333; margin-bottom: 2rem; }
  
  .t14-item { margin-bottom: 1.5rem; }
  .t14-item-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.2rem; }
  .t14-item-title { font-weight: 900; font-size: 0.95rem; }
  .t14-item-date { font-weight: 700; font-size: 0.8rem; color: #666; }
  .t14-desc { font-size: 0.85rem; line-height: 1.6; padding-left: 1.2rem; margin: 0; }
</style>

<div class="t14-wrap">
  <div class="t14-left">
    <div class="t14-sect-side">
      <div class="t14-side-title">Details</div>
      <div class="t14-side-v">
        <strong>Address</strong>
        <span data-field="location">City, Country</span>
      </div>
      <div class="t14-side-v">
        <strong>Phone</strong>
        <span data-field="phone">+1 234 567 890</span>
      </div>
      <div class="t14-side-v">
        <strong>Email</strong>
        <span data-field="email">email@example.com</span>
      </div>
    </div>

    <div class="t14-sect-side">
      <div class="t14-side-title">Skills</div>
      <div data-list="skills">
        <div class="t14-side-v" data-tpl data-field="name">Skill</div>
      </div>
    </div>
  </div>

  <div class="t14-right">
    <div class="t14-name-box">
      <h1 class="t14-name" data-field="full_name">YOUR NAME</h1>
      <div class="t14-role-top" data-field="position">PROFESSIONAL TITLE</div>
    </div>

    <div style="margin-top: 2rem;">
      <div class="t14-sect-title">Summary</div>
      <p class="t14-p" data-field="summary">Your summary...</p>

      <div class="t14-sect-title">Experience</div>
      <div data-list="experiences">
        <div class="t14-item" data-tpl>
          <div class="t14-item-top">
            <span class="t14-item-title"><span data-field="position">Role</span>, <span data-field="company">Company</span></span>
          </div>
          <div class="t14-item-date" style="margin-bottom:0.5rem;" data-field="date_range">Jan 2020 - Current</div>
          <ul class="t14-desc">
            <li data-field="description">Description...</li>
          </ul>
        </div>
      </div>

      <div class="t14-sect-title">Education</div>
      <div data-list="educations">
        <div class="t14-item" data-tpl>
          <div class="t14-item-top">
            <span class="t14-item-title"><span data-field="institution">Institution</span>, <span data-field="degree">Degree</span></span>
          </div>
          <div class="t14-item-date" data-field="date_range">2016 - 2020</div>
        </div>
      </div>
    </div>
  </div>
</div>
