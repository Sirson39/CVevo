<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Montserrat:wght@400;700&swap');
  .t23-wrap { font-family: 'Crimson Pro', serif; background: #fff; min-height: 850px; text-align: left; }
  .t23-top { display: grid; grid-template-columns: 45% 55%; border-bottom: 2px solid #eee; padding-bottom: 2rem; }
  .t23-name-box { padding: 3rem 2.5rem; background: radial-gradient(circle at 50% 50%, #fff0f5 0%, #fff 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .t23-name { font-family: 'Crimson Pro', serif; font-size: 3.5rem; font-weight: 700; color: #1a1a1a; line-height: 1; margin: 0; letter-spacing: -1px; }
  .t23-role { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #666; letter-spacing: 2px; margin-top: 1rem; }
  
  .t23-contact-box { padding: 3rem 2.5rem; border-left: 1px solid #eee; display: flex; flex-direction: column; justify-content: center; gap: 0.8rem; }
  .t23-contact-item { font-size: 0.95rem; color: #333; }
  
  .t23-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 2px solid #eee; }
  .t23-cell { padding: 2.5rem; border-right: 1px solid #eee; border-bottom: 1px solid #eee; }
  .t23-cell:nth-child(2n) { border-right: none; }
  
  .t23-sect-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .t23-sect-title { font-family: 'Crimson Pro', serif; font-size: 1.5rem; font-weight: 700; color: #1a1a1a; }
  .t23-sparkle { color: #ffb6c1; font-size: 1.5rem; }
  
  .t23-p { font-size: 1rem; line-height: 1.6; color: #333; text-align: justify; margin: 0; white-space: pre-line; }
  
  .t23-item { margin-bottom: 1.5rem; }
  .t23-item-date { font-weight: 700; font-size: 0.9rem; color: #1a1a1a; text-transform: uppercase; margin-bottom: 0.3rem; }
  .t23-item-title { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; color: #1a1a1b; }
  .t23-item-sub { font-size: 1rem; color: #666; font-style: italic; margin-bottom: 0.8rem; }
  .t23-desc { font-size: 0.95rem; line-height: 1.6; color: #333; padding-left: 1.2rem; margin: 0; }
  
  .t23-skill-list { list-style: none; padding: 0; margin: 0; line-height: 2; font-size: 1.05rem; }
</style>

<div class="t23-wrap">
  <div class="t23-top">
    <div class="t23-name-box">
      <h1 class="t23-name" data-field="full_name">YOUR NAME</h1>
      <div class="t23-role" data-field="position">PROFESSIONAL TITLE</div>
    </div>
    <div class="t23-contact-box">
      <div class="t23-contact-item" data-field="email">email@example.com</div>
      <div class="t23-contact-item" data-field="phone">+1 234 567 890</div>
      <div class="t23-contact-item" data-field="location">City, Country</div>
      <div class="t23-contact-item" data-field="linkedin">LinkedIn</div>
      <div class="t23-contact-item" data-field="portfolio">Portfolio</div>
    </div>
  </div>

  <div class="t23-grid">
    <div class="t23-cell">
      <div class="t23-sect-header">
        <div class="t23-sect-title">Experience</div>
        <div class="t23-sparkle">✦</div>
      </div>
      <div data-list="experiences">
        <div class="t23-item" data-tpl>
          <div class="t23-item-date" data-field="date_range">Jan 2020 - Current</div>
          <div class="t23-item-title" data-field="position">Role Name</div>
          <div class="t23-item-sub"><span data-field="company">Company</span>, <span data-field="location">Location</span></div>
          <ul class="t23-desc">
            <li data-field="description">Job description...</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="t23-cell">
      <div class="t23-sect-header">
        <div class="t23-sect-title">Summary</div>
        <div class="t23-sparkle">✦</div>
      </div>
      <p class="t23-p" data-field="summary">Your summary content...</p>
    </div>

    <div class="t23-cell">
      <div class="t23-sect-header">
        <div class="t23-sect-title">Education</div>
        <div class="t23-sparkle">✦</div>
      </div>
      <div data-list="educations">
        <div class="t23-item" data-tpl>
          <div class="t23-item-date" data-field="date_range">2016 - 2020</div>
          <div class="t23-item-title" data-field="degree">Degree Name</div>
          <div class="t23-item-sub" data-field="institution">Institution</div>
        </div>
      </div>
    </div>

    <div class="t23-cell" style="border-right:none;">
      <div class="t23-sect-header">
        <div class="t23-sect-title">Skills</div>
        <div class="t23-sparkle">✦</div>
      </div>
      <ul class="t23-skill-list" data-list="skills">
        <li data-tpl data-field="name">Skill Name</li>
      </ul>
    </div>
  </div>
</div>
