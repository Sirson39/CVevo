<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Public+Sans:wght@400;700&swap');
  .t13-wrap { font-family: 'Public Sans', sans-serif; background: #fff; color: #1e293b; text-align: left; padding: 2.5rem; }
  .t13-header { margin-bottom: 2rem; position: relative; }
  .t13-name { font-family: 'Crimson Pro', serif; font-size: 2.8rem; font-weight: 700; color: #0f172a; margin: 0; }
  .t13-role { font-size: 1rem; font-weight: 700; text-transform: uppercase; color: #334155; text-align: right; margin-top: -1.5rem; }
  
  .t13-contact-bar { border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 0.8rem 0; margin-top: 1.5rem; display: flex; font-size: 0.8rem; color: #64748b; gap: 1rem; }
  
  .t13-sect { margin-top: 2rem; }
  .t13-sect-title { background-color: #f1f5f9; padding: 0.3rem 1rem; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; display: inline-block; margin-bottom: 1.2rem; }
  
  .t13-p { font-size: 0.95rem; line-height: 1.6; color: #334155; margin-bottom: 1.5rem; }
  
  .t13-item { margin-bottom: 1.5rem; }
  .t13-date-box { background: #334155; color: #fff; padding: 0.2rem 0.6rem; font-size: 0.8rem; font-weight: 700; display: inline-block; margin-bottom: 0.5rem; }
  .t13-item-title { font-weight: 700; font-size: 1rem; color: #0f172a; }
  .t13-item-sub { font-size: 0.9rem; color: #64748b; }
  .t13-desc { font-size: 0.9rem; line-height: 1.6; margin-top: 0.5rem; padding-left: 1.2rem; }
  
  .t13-skills-wrap { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
  .t13-skill-tag { border: 1px solid #cbd5e1; padding: 0.4rem 1rem; font-size: 0.85rem; color: #334155; font-weight: 500; }
</style>

<div class="t13-wrap">
  <div class="t13-header">
    <h1 class="t13-name" data-field="full_name">YOUR NAME</h1>
    <div class="t13-role" data-field="position">PROFESSIONAL ROLE</div>
    <div class="t13-contact-bar">
      <span data-field="location">City, Country</span>
      <span>•</span>
      <span data-field="phone">+1 234 567 890</span>
      <span>•</span>
      <span data-field="email">email@example.com</span>
    </div>
  </div>

  <div class="t13-sect">
    <div class="t13-sect-title">Summary</div>
    <p class="t13-p" data-field="summary">Your summary...</p>
  </div>

  <div class="t13-sect">
    <div class="t13-sect-title">Experience</div>
    <div data-list="experiences">
      <div class="t13-item" data-tpl>
        <div class="t13-date-box" data-field="date_range">Jan 2020 — Current</div><br>
        <span class="t13-item-title" data-field="position">Role Name</span> | <span class="t13-item-sub" data-field="company">Company</span>
        <ul class="t13-desc">
          <li data-field="description">Description...</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="t13-sect">
    <div class="t13-sect-title">Education</div>
    <div data-list="educations">
      <div class="t13-item" data-tpl>
        <div class="t13-date-box" data-field="date_range">2016 — 2020</div><br>
        <span class="t13-item-title" data-field="degree">Degree Name</span><br>
        <span class="t13-item-sub" data-field="institution">Institution</span>
      </div>
    </div>
  </div>

  <div class="t13-sect" style="margin-top:2rem;">
    <div class="t13-sect-title">Skills</div>
    <div class="t13-skills-wrap" data-list="skills">
      <span class="t13-skill-tag" data-tpl data-field="name">Skill</span>
    </div>
  </div>
</div>
