<div id="appConfirmModal" class="confirm-overlay" style="display: none;">
  <div class="confirm-modal">
    <div class="confirm-ico">
      <!-- Icon injected via JS -->
    </div>
    <h3 class="confirm-h3">Delete Item?</h3>
    <p class="confirm-p">Are you sure you want to perform this action? This cannot be undone.</p>
    <div class="confirm-actions">
      <button type="button" class="btn btn-ghost c-btn-cancel">Cancel</button>
      <button type="button" class="btn btn-danger c-btn-confirm">Yes, Delete</button>
    </div>
  </div>
</div>
