<!-- Custom Confirmation Modal -->
<div id="customConfirmModal" class="confirm-modal-overlay">
    <div class="confirm-modal-card">
        <div class="confirm-modal-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <h2 id="confirmTitle">Confirm Action</h2>
        <p id="confirmMessage">Are you sure you want to proceed with this action?</p>
        <div class="confirm-modal-actions">
            <button id="confirmCancelBtn" class="confirm-btn cancel">Cancel</button>
            <button id="confirmProceedBtn" class="confirm-btn proceed">Yes, Proceed</button>
        </div>
    </div>
</div>

<style>
    .confirm-modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(8px);
        display: none;
        place-items: center;
        z-index: 10000;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    .confirm-modal-overlay.active { display: grid; opacity: 1; }
    
    .confirm-modal-card {
        background: white;
        padding: 32px;
        border-radius: 24px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        transform: scale(0.9);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .confirm-modal-overlay.active .confirm-modal-card { transform: scale(1); }

    .confirm-modal-icon {
        width: 64px; height: 64px; 
        background: #fff1f2; color: #e11d48;
        border-radius: 50%;
        display: grid; place-items: center;
        margin: 0 auto 20px;
    }
    .confirm-modal-icon svg { width: 32px; height: 32px; }

    .confirm-modal-card h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 10px; }
    .confirm-modal-card p { color: #64748b; font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; }

    .confirm-modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .confirm-btn { padding: 12px; border-radius: 14px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.2s; border: none; }
    
    .confirm-btn.cancel { background: #f1f5f9; color: #475569; }
    .confirm-btn.cancel:hover { background: #e2e8f0; }
    
    .confirm-btn.proceed { background: #1e293b; color: white; }
    .confirm-btn.proceed:hover { background: #0f172a; transform: translateY(-1px); }

    /* For destructive actions */
    .confirm-modal-card.destructive .confirm-modal-icon { background: #fff1f2; color: #e11d48; }
    .confirm-modal-card.destructive .confirm-btn.proceed { background: #e11d48; }
    .confirm-modal-card.destructive .confirm-btn.proceed:hover { background: #be123c; }
</style>

<script>
    let confirmCallback = null;

    function showConfirmModal(title, message, callback, isDestructive = true) {
        const modal = document.getElementById('customConfirmModal');
        const card = modal.querySelector('.confirm-modal-card');
        
        document.getElementById('confirmTitle').innerText = title;
        document.getElementById('confirmMessage').innerText = message;
        
        if (isDestructive) card.classList.add('destructive');
        else card.classList.remove('destructive');
        
        modal.classList.add('active');
        confirmCallback = callback;
    }

    function closeConfirmModal() {
        document.getElementById('customConfirmModal').classList.remove('active');
        confirmCallback = null;
    }

    document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirmModal);
    document.getElementById('confirmProceedBtn').addEventListener('click', () => {
        if (confirmCallback) confirmCallback();
        closeConfirmModal();
    });

    // Close on overlay click
    document.getElementById('customConfirmModal').addEventListener('click', (e) => {
        if (e.target.id === 'customConfirmModal') closeConfirmModal();
    });
</script>
