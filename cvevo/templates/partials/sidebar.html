<aside class="sidebar" aria-label="Sidebar">
  <!-- Top / Brand -->
  <div class="side-top">
    <a class="brand" href="{% url 'jobseeker_dashboard' %}">
      <span class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 3h7l4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2"/>
          <path d="M9 13h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="brand-text">
        <span class="c">CV</span><span class="e">evo</span>
      </span>
    </a>
  </div>

  <!-- Scrollable menu area -->
  <div class="side-scroll">
    <!-- MAIN -->
    <div class="side-section">
      <div class="side-title">MAIN</div>

      <nav class="nav">
        <a class="nav-item {% if request.resolver_match.url_name == 'jobseeker_dashboard' %}active{% endif %}"
           href="{% url 'jobseeker_dashboard' %}">
          <span class="nav-ico" aria-hidden="true">
            <!-- Dashboard icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 4h7v7H4V4Z" stroke="currentColor" stroke-width="2" />
              <path d="M13 4h7v5h-7V4Z" stroke="currentColor" stroke-width="2" />
              <path d="M13 11h7v9h-7v-9Z" stroke="currentColor" stroke-width="2" />
              <path d="M4 13h7v7H4v-7Z" stroke="currentColor" stroke-width="2" />
            </svg>
          </span>
          <span class="nav-text">Dashboard</span>
        </a>

        <a class="nav-item {% if request.resolver_match.url_name == 'resume_upload' %}active{% endif %}"
           href="{% url 'resume_upload' %}">
          <span class="nav-ico" aria-hidden="true">
            <!-- Upload icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M7 8l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-text">Resume Upload</span>
        </a>

        <a class="nav-item {% if request.resolver_match.url_name == 'analysis_results' %}active{% endif %}"
           href="{% url 'analysis_results' %}">
          <span class="nav-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 20V10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M18 20V4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M6 20v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-text">Analysis Results</span>
        </a>

        <a class="nav-item {% if request.resolver_match.url_name == 'resume_builder' %}active{% endif %}"
           href="{% url 'resume_builder' %}">
          <span class="nav-ico" aria-hidden="true">
            <!-- Pencil/Builder icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="nav-text">Resume Builder</span>
        </a>

        <a class="nav-item {% if request.resolver_match.url_name == 'templates_gallery' %}active{% endif %}"
           href="{% url 'templates_gallery' %}">
          <span class="nav-ico" aria-hidden="true">
            <!-- Layout/Templates icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 5h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 12h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M16 10h4v4h-4v-4Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <span class="nav-text">Templates Gallery</span>
        </a>

        <a class="nav-item {% if request.resolver_match.url_name == 'export_downloads' %}active{% endif %}"
           href="{% url 'export_downloads' %}">
          <span class="nav-ico" aria-hidden="true">
            <!-- Download icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M8 10l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-text">Export / Downloads</span>
        </a>
      </nav>
    </div>

    <!-- ACCOUNT -->
    <div class="side-section">
      <div class="side-title">ACCOUNT</div>

      <nav class="nav">
        <a class="nav-item {% if request.resolver_match.url_name == 'profile_settings' %}active{% endif %}"
           href="{% url 'profile_settings' %}">
          <span class="nav-ico" aria-hidden="true">
            <!-- User icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <span class="nav-text">Profile &amp; Settings</span>
        </a>

        <a class="nav-item {% if request.resolver_match.url_name == 'help_support' %}active{% endif %}"
           href="{% url 'help_support' %}">
          <span class="nav-ico" aria-hidden="true">
            <!-- Help icon -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 18h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <path d="M9.5 9a2.5 2.5 0 1 1 4.2 1.8c-.9.7-1.7 1.2-1.7 2.7v.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <span class="nav-text">Help / Support</span>
        </a>
      </nav>
    </div>
  </div>

  <!-- Bottom / Logout (always visible) -->
  <div class="side-bottom">
        <a class="logout" href="/logout/">
            <span class="logout-ico" aria-hidden="true">
            <!-- clean icon -->
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 7V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-7a2 2 0 0 1-2-2v-1"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M15 12H3m0 0 3-3m-3 3 3 3"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            </span>
            <span>Logout</span>
        </a>
    </div>


</aside>
