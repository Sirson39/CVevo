{% if messages %}
<div class="messages">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}"
        style="padding: 1rem; margin-bottom: 1rem; border-radius: 8px; background: {% if message.tags == 'success' %}#dcfce7; color: #166534;{% elif message.tags == 'error' %}#fee2e2; color: #991b1b;{% else %}#f1f5f9; color: #1e293b;{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
