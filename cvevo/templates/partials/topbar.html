<header class="topbar">
  <div class="topbar-left">
    <div class="page-title">
      <h1>Dashboard</h1>
      <p>Welcome back! Here's your overview.</p>
    </div>
  </div>

  <div class="topbar-right">
    <div class="role-toggle" role="tablist" aria-label="Role">
      <button class="role-pill is-active" type="button">Jobseeker</button>
      <button class="role-pill" type="button">HR</button>
    </div>

    <label class="search">
      <input type="search" placeholder="Search..." />
    </label>

    <button class="iconbtn" type="button" aria-label="Notifications">
      <span class="dot" aria-hidden="true"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px; height:20px;">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
    </button>

    <button class="user" type="button">
      <span class="avatar">{{ user.email|slice:":1"|upper }}</span>
      <span class="user-meta">
        <span class="user-name">{{ user.jobseeker_profile.full_name|default:user.email|slice:":15" }}</span>
      </span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        style="width:14px; height:14px; margin-left: 4px;">
        <path d="M6 9l6 6 6-6" />
      </svg>
    </button>
  </div>
</header>
